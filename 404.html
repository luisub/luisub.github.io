<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:    #07080c;
      --bg-elevated:   #161a26;
      --border:        #1c2030;
      --border-strong: #262b3d;
      --border-accent: rgba(129, 140, 248, 0.28);
      --text-primary:  #e6e8ef;
      --text-secondary: #a3a8b8;
      --text-muted:    #6b7185;
      --accent:        #818cf8;
      --accent-bright: #a5b4fc;
      --accent-cyan:   #67e8f9;
      --gradient-accent: linear-gradient(135deg, #818cf8 0%, #67e8f9 100%);
      --sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --serif: 'Instrument Serif', 'Source Serif 4', Georgia, serif;
      --mono:  'JetBrains Mono', 'Fira Code', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(600px 400px at 50% 30%, rgba(129, 140, 248, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .container { max-width: 480px; position: relative; z-index: 1; }
    .error-code {
      font-family: var(--serif);
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.03em;
      background: var(--gradient-accent);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    p {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.7;
      margin-bottom: 2.4rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.3rem;
      border: 1px solid var(--border-strong);
      border-radius: 99px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.25s ease;
      background: rgba(22, 26, 38, 0.5);
    }
    a:hover {
      border-color: var(--border-accent);
      background: rgba(129, 140, 248, 0.08);
      color: var(--accent-bright);
      transform: translateY(-1px);
    }
    .home-link {
      background: var(--gradient-accent);
      color: #07080c;
      border-color: transparent;
      font-weight: 600;
      box-shadow: 0 8px 24px -8px rgba(129, 140, 248, 0.5);
    }
    .home-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px -8px rgba(129, 140, 248, 0.7);
      color: #07080c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Signal Lost</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="home-link">← Return Home</a>
  </div>
</body>
</html>
