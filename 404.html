<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-card: #151d2e;
      --border: #1e2a42;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #2dd4bf;
      --accent-secondary: #818cf8;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --serif: 'Source Serif 4', Georgia, serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--mono);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -4px;
    }
    h1 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    p {
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--accent);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      transition: all 0.2s;
    }
    a:hover {
      background: var(--accent);
      color: var(--bg-primary);
      box-shadow: 0 0 30px rgba(45, 212, 191, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Signal Lost</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">← Return Home</a>
  </div>
</body>
</html>
